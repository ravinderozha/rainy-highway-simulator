<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Realistic Rain Highway Simulator</title>
<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#6f8fb1;
}
canvas{
  display:block;
}
#tag{
  position:fixed;
  top:12px;
  left:12px;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
  font-size:15px;
  padding:8px 12px;
  border-radius:10px;
  background:rgba(0,0,0,.25);
}
</style>
</head>
<body>

<div id="tag">Realistic Rain Highway Simulator</div>
<canvas id="cv"></canvas>

<script>
const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
  w = canvas.width = innerWidth;
  h = canvas.height = innerHeight;
}
addEventListener("resize",resize);
resize();

function rand(a,b){ return Math.random()*(b-a)+a; }

// ==========================
// WORLD
// ==========================
const rain = [];
const clouds = [];
const carsUpper = [];
const carsLower = [];

// rain
for(let i=0;i<220;i++){
  rain.push({
    x:rand(0,w),
    y:rand(0,h),
    s:rand(10,18)
  });
}

// clouds
for(let i=0;i<4;i++){
  clouds.push({
    x:rand(0,w),
    y:rand(40,130),
    s:rand(0.15,0.35)
  });
}

// vehicle colors
const palette = ["#e53935","#1e88e5","#43a047","#fb8c00","#fdd835","#8e24aa","#00acc1","#ffffff","#546e7a"];

// upper road (left)
for(let i=0;i<7;i++){
  carsUpper.push({
    x:w + i*220,
    speed:rand(2.8,4.8),
    color:palette[i%palette.length],
    len:rand(52,68)
  });
}

// lower road (right)
for(let i=0;i<7;i++){
  carsLower.push({
    x:-i*240,
    speed:rand(3,5),
    color:palette[(i+3)%palette.length],
    len:rand(52,70)
  });
}

// ==========================
// DRAW HELPERS
// ==========================
function rect(x,y,ww,hh,c){
  ctx.fillStyle=c;
  ctx.fillRect(x,y,ww,hh);
}

function circle(x,y,r,c){
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=c;
  ctx.fill();
}

function cloud(x,y){
  ctx.fillStyle="rgba(255,255,255,.35)";
  circle(x,y,24);
  circle(x+28,y-8,32);
  circle(x+58,y,24);
  circle(x+28,y+10,26);
}

function mountain(x,y,size,color){
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x+size,y-size);
  ctx.lineTo(x+size*2,y);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
}

function tree(x,y){
  rect(x+5,y,10,34,"#5d3a1a");
  circle(x+10,y-4,18,"#0a8d0a");
  circle(x-2,y+6,13,"#087208");
  circle(x+22,y+6,13,"#1db71d");
}

function drawRoad(y){
  // shoulder
  rect(0,y-4,w,4,"#666");
  rect(0,y+88,w,4,"#666");

  // asphalt
  rect(0,y,w,88,"#2f2f2f");

  // subtle wet sheen
  rect(0,y+5,w,6,"rgba(255,255,255,.05)");

  // lane markers
  ctx.strokeStyle="white";
  ctx.lineWidth=3;

  for(let i=0;i<w;i+=62){
    ctx.beginPath();
    ctx.moveTo(i,y+44);
    ctx.lineTo(i+34,y+44);
    ctx.stroke();
  }
}

function drawCar(x,y,len,color,dir){
  // reflection
  rect(x-len/2,y+18,len,3,"rgba(255,255,255,.05)");

  // body
  rect(x-len/2,y-15,len,24,color);

  // cabin
  rect(x-len/4,y-30,len/2,16,color);

  // wheels
  circle(x-len/3,y+12,7,"black");
  circle(x+len/3,y+12,7,"black");

  // windshield
  rect(x-10,y-26,20,10,"rgba(220,240,255,.35)");
}

// ==========================
// LOOP
// ==========================
function animate(){

  // sky
  rect(0,0,w,h,"#6f8fb1");

  // sun behind clouds
  circle(w-120,90,48,"#ffd400");

  // clouds
  clouds.forEach(c=>{
    cloud(c.x,c.y);
    c.x += c.s;
    if(c.x>w+120) c.x=-140;
  });

  // mountains
  for(let x=-100;x<w+180;x+=180){
    mountain(x,h*0.42,90,"#6a4b33");
  }

  // grass land
  rect(0,h*0.42,w,h*0.58,"#2faa2f");

  // top roadside trees
  for(let x=0;x<w+40;x+=160){
    tree(x,h*0.42);
  }

  // roads
  const road1 = h*0.52;
  const road2 = h*0.72;

  drawRoad(road1);
  drawRoad(road2);

  // upper traffic left
  carsUpper.forEach(c=>{
    c.x -= c.speed;

    if(c.x < -120){
      c.x = w + rand(80,180);
    }

    drawCar(c.x,road1+44,c.len,c.color,"left");
  });

  // lower traffic right
  carsLower.forEach(c=>{
    c.x += c.speed;

    if(c.x > w+120){
      c.x = -rand(100,220);
    }

    drawCar(c.x,road2+44,c.len,c.color,"right");
  });

  // rain
  ctx.strokeStyle="rgba(210,245,255,.9)";
  ctx.lineWidth=1.4;

  rain.forEach(d=>{
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x-4,d.y+14);
    ctx.stroke();

    d.y += d.s;
    d.x -= 1.5;

    if(d.y > h){
      d.y = -20;
      d.x = rand(0,w);
    }
  });

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
